openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ERP System API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: super-admin
    description: Super admin operations
  - name: businesses
    description: Business/tenant management
  - name: users
    description: User management
  - name: parties
    description: Customers and suppliers
  - name: items
    description: Products and services
  - name: units
    description: Units of measurement
  - name: hsn
    description: HSN codes
  - name: tax-rates
    description: GST tax rates
  - name: custom-fields
    description: Custom field definitions
  - name: sales
    description: Sales invoices and credit notes
  - name: purchases
    description: Purchase bills and debit notes
  - name: payments
    description: Payments (bill-wise and on-account)
  - name: inventory
    description: Stock management
  - name: accounting
    description: Ledger and financial reports
  - name: gst
    description: GST reports
  - name: dashboard
    description: Dashboard and analytics
  - name: mini-app
    description: Customer Network App (mobile customer-facing mini app)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # SUPER ADMIN
  /super-admin/businesses:
    get:
      operationId: listAllBusinesses
      tags: [super-admin]
      summary: List all businesses
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of businesses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessListResponse"

  /super-admin/businesses/{id}:
    get:
      operationId: getBusinessById
      tags: [super-admin]
      summary: Get business details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Business details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    patch:
      operationId: updateBusinessStatus
      tags: [super-admin]
      summary: Update business status (activate/deactivate)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessStatusBody"
      responses:
        "200":
          description: Business updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  /super-admin/plans:
    get:
      operationId: listPlans
      tags: [super-admin]
      summary: List all subscription plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Plan"
                required: [data]
    post:
      operationId: createPlan
      tags: [super-admin]
      summary: Create a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanBody"
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

  /super-admin/stats:
    get:
      operationId: getSuperAdminStats
      tags: [super-admin]
      summary: Get platform-level stats
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperAdminStats"

  # BUSINESS REGISTRATION
  /businesses/register:
    post:
      operationId: registerBusiness
      tags: [businesses]
      summary: Register a new business
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBusinessBody"
      responses:
        "201":
          description: Business registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /businesses/current:
    get:
      operationId: getCurrentBusiness
      tags: [businesses]
      summary: Get current business details
      responses:
        "200":
          description: Business details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    patch:
      operationId: updateCurrentBusiness
      tags: [businesses]
      summary: Update current business settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessBody"
      responses:
        "200":
          description: Business updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  # USERS
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users in current business
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                required: [data]
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # PARTIES
  /parties:
    get:
      operationId: listParties
      tags: [parties]
      summary: List parties (customers/suppliers)
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [customer, supplier, both]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of parties
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartyListResponse"
    post:
      operationId: createParty
      tags: [parties]
      summary: Create a party
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartyBody"
      responses:
        "201":
          description: Party created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"

  /parties/{id}:
    get:
      operationId: getParty
      tags: [parties]
      summary: Get party details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Party details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
    patch:
      operationId: updateParty
      tags: [parties]
      summary: Update party
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartyBody"
      responses:
        "200":
          description: Party updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
    delete:
      operationId: deleteParty
      tags: [parties]
      summary: Delete party
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Party deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /parties/{id}/ledger:
    get:
      operationId: getPartyLedger
      tags: [parties]
      summary: Get party ledger (statement)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: fromDate
          in: query
          schema:
            type: string
        - name: toDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Party ledger entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartyLedgerResponse"

  # ITEMS
  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List items
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [goods, service]
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"
    post:
      operationId: createItem
      tags: [items]
      summary: Create an item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemBody"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get item details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
    patch:
      operationId: updateItem
      tags: [items]
      summary: Update item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemBody"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # UNITS
  /units:
    get:
      operationId: listUnits
      tags: [units]
      summary: List units of measurement
      responses:
        "200":
          description: List of units
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Unit"
                required: [data]
    post:
      operationId: createUnit
      tags: [units]
      summary: Create a unit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUnitBody"
      responses:
        "201":
          description: Unit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"

  /units/{id}:
    delete:
      operationId: deleteUnit
      tags: [units]
      summary: Delete unit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unit deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # HSN CODES
  /hsn:
    get:
      operationId: listHsnCodes
      tags: [hsn]
      summary: List HSN codes
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of HSN codes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/HsnCode"
                required: [data]
    post:
      operationId: createHsnCode
      tags: [hsn]
      summary: Create HSN code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHsnCodeBody"
      responses:
        "201":
          description: HSN code created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HsnCode"

  # TAX RATES
  /tax-rates:
    get:
      operationId: listTaxRates
      tags: [tax-rates]
      summary: List tax rates
      responses:
        "200":
          description: List of tax rates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaxRate"
                required: [data]
    post:
      operationId: createTaxRate
      tags: [tax-rates]
      summary: Create tax rate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaxRateBody"
      responses:
        "201":
          description: Tax rate created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxRate"

  # CUSTOM FIELDS
  /custom-fields:
    get:
      operationId: listCustomFields
      tags: [custom-fields]
      summary: List custom field definitions
      parameters:
        - name: entity
          in: query
          schema:
            type: string
            enum: [item, party, voucher, voucher_item]
      responses:
        "200":
          description: List of custom fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomField"
                required: [data]
    post:
      operationId: createCustomField
      tags: [custom-fields]
      summary: Create custom field
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomFieldBody"
      responses:
        "201":
          description: Custom field created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomField"

  /custom-fields/{id}:
    delete:
      operationId: deleteCustomField
      tags: [custom-fields]
      summary: Delete custom field
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Custom field deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # SALES INVOICES
  /sales/invoices:
    get:
      operationId: listSalesInvoices
      tags: [sales]
      summary: List sales invoices
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: partyId
          in: query
          schema:
            type: integer
        - name: fromDate
          in: query
          schema:
            type: string
        - name: toDate
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, posted, paid, partial, cancelled]
      responses:
        "200":
          description: List of sales invoices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherListResponse"
    post:
      operationId: createSalesInvoice
      tags: [sales]
      summary: Create sales invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoucherBody"
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"

  /sales/invoices/{id}:
    get:
      operationId: getSalesInvoice
      tags: [sales]
      summary: Get sales invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"
    patch:
      operationId: updateSalesInvoice
      tags: [sales]
      summary: Update sales invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoucherBody"
      responses:
        "200":
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"
    delete:
      operationId: deleteSalesInvoice
      tags: [sales]
      summary: Delete/cancel sales invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # SALES CREDIT NOTES (returns)
  /sales/credit-notes:
    get:
      operationId: listCreditNotes
      tags: [sales]
      summary: List credit notes (sales returns)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: fromDate
          in: query
          schema:
            type: string
        - name: toDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of credit notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherListResponse"
    post:
      operationId: createCreditNote
      tags: [sales]
      summary: Create credit note (sales return)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoucherBody"
      responses:
        "201":
          description: Credit note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"

  /sales/credit-notes/{id}:
    get:
      operationId: getCreditNote
      tags: [sales]
      summary: Get credit note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Credit note details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"

  # PURCHASE BILLS
  /purchases/bills:
    get:
      operationId: listPurchaseBills
      tags: [purchases]
      summary: List purchase bills
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: partyId
          in: query
          schema:
            type: integer
        - name: fromDate
          in: query
          schema:
            type: string
        - name: toDate
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of purchase bills
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherListResponse"
    post:
      operationId: createPurchaseBill
      tags: [purchases]
      summary: Create purchase bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoucherBody"
      responses:
        "201":
          description: Purchase bill created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"

  /purchases/bills/{id}:
    get:
      operationId: getPurchaseBill
      tags: [purchases]
      summary: Get purchase bill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase bill details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"
    patch:
      operationId: updatePurchaseBill
      tags: [purchases]
      summary: Update purchase bill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoucherBody"
      responses:
        "200":
          description: Purchase bill updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"
    delete:
      operationId: deletePurchaseBill
      tags: [purchases]
      summary: Delete purchase bill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase bill deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # PURCHASE DEBIT NOTES (returns)
  /purchases/debit-notes:
    get:
      operationId: listDebitNotes
      tags: [purchases]
      summary: List debit notes (purchase returns)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: fromDate
          in: query
          schema:
            type: string
        - name: toDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of debit notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherListResponse"
    post:
      operationId: createDebitNote
      tags: [purchases]
      summary: Create debit note (purchase return)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoucherBody"
