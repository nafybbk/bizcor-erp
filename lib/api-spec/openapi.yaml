  # PAYMENTS
  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payments
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [receipt, payment]
        - name: partyId
          in: query
          schema:
            type: integer
        - name: fromDate
          in: query
          schema:
            type: string
        - name: toDate
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentListResponse"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Create payment (bill-wise or on-account)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    get:
      operationId: getPayment
      tags: [payments]
      summary: Get payment details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /payments/outstanding:
    get:
      operationId: getOutstandingBills
      tags: [payments]
      summary: Get outstanding bills for a party
      parameters:
        - name: partyId
          in: query
          required: true
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [receivable, payable]
      responses:
        "200":
          description: Outstanding bills
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutstandingResponse"

  # INVENTORY
  /inventory/stock:
    get:
      operationId: getStockSummary
      tags: [inventory]
      summary: Get current stock summary
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Stock summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSummaryResponse"

  /inventory/stock/{itemId}:
    get:
      operationId: getItemStockLedger
      tags: [inventory]
      summary: Get stock ledger for an item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
        - name: fromDate
          in: query
          schema:
            type: string
        - name: toDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Item stock ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockLedgerResponse"

  # ACCOUNTING
  /accounting/ledger/{partyId}:
    get:
      operationId: getAccountingLedger
      tags: [accounting]
      summary: Get accounting ledger for a party
      parameters:
        - name: partyId
          in: path
          required: true
          schema:
            type: integer
        - name: fromDate
          in: query
          schema:
            type: string
        - name: toDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Ledger entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartyLedgerResponse"

  /accounting/trial-balance:
    get:
      operationId: getTrialBalance
      tags: [accounting]
      summary: Get trial balance
      parameters:
        - name: fromDate
          in: query
          schema:
            type: string
        - name: toDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Trial balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrialBalanceResponse"

  /accounting/outstanding-receivables:
    get:
      operationId: getOutstandingReceivables
      tags: [accounting]
      summary: Get outstanding receivables summary
      responses:
        "200":
          description: Outstanding receivables
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutstandingSummaryResponse"

  /accounting/outstanding-payables:
    get:
      operationId: getOutstandingPayables
      tags: [accounting]
      summary: Get outstanding payables summary
      responses:
        "200":
          description: Outstanding payables
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutstandingSummaryResponse"

  # GST REPORTS
  /gst/gstr1:
    get:
      operationId: getGstr1
      tags: [gst]
      summary: Get GSTR-1 data
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: GSTR-1 report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gstr1Response"

  /gst/gstr3b:
    get:
      operationId: getGstr3b
      tags: [gst]
      summary: Get GSTR-3B summary
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: GSTR-3B summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gstr3bResponse"

  /gst/gstr1/export:
    get:
      operationId: exportGstr1Json
      tags: [gst]
      summary: Export GSTR-1 as JSON for GST portal upload
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: GSTR-1 JSON export
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                  filename:
                    type: string
                required: [data, filename]

  # DASHBOARD
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, this_month, last_month, this_year]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/sales-trend:
    get:
      operationId: getSalesTrend
      tags: [dashboard]
      summary: Get sales trend data (last 12 months)
      responses:
        "200":
          description: Sales trend
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesTrendResponse"

  /dashboard/top-parties:
    get:
      operationId: getTopParties
      tags: [dashboard]
      summary: Get top customers/suppliers by amount
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [customer, supplier]
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Top parties
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopPartiesResponse"

  /dashboard/gst-summary:
    get:
      operationId: getGstDashboardSummary
      tags: [dashboard]
      summary: Get current month GST summary for dashboard
      responses:
        "200":
          description: GST summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GstDashboardSummary"

  /mini-app/settings:
    get:
      operationId: miniAppSettings
      tags: [mini-app]
      summary: Public branding info for the mini-app login screen (no auth)
      responses:
        "200":
          description: Branding settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniAppSettingsResponse"

  /mini-app/login:
    post:
      operationId: miniAppLogin
      tags: [mini-app]
      summary: Customer mini-app login (mobile + PIN, auto-creates on first login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MiniAppLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniAppLoginResponse"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid PIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mini-app/connect:
    post:
      operationId: miniAppConnect
      tags: [mini-app]
      summary: Connect to a supplier using businessCode + party PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MiniAppConnectBody"
      responses:
        "200":
          description: Connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniAppConnectResponse"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid PIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Business code not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mini-app/connections:
    get:
      operationId: miniAppListConnections
      tags: [mini-app]
      summary: List all connected suppliers for the logged-in customer
      responses:
        "200":
          description: Connections list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MiniAppConnection"

  /mini-app/connections/{id}/messages/recent:
    get:
      operationId: miniAppRecentMessages
      tags: [mini-app]
      summary: Get the last 50 chat messages for a connection (initial load)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recent messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MiniAppChatMessage"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mini-app/connections/{id}/messages:
    get:
      operationId: miniAppPollMessages
      tags: [mini-app]
      summary: Poll for new chat messages since a given message id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: since
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: New messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MiniAppChatMessage"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: miniAppSendMessage
      tags: [mini-app]
      summary: Send a chat message to a connected supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MiniAppSendMessageBody"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniAppChatMessage"
        "400":
          description: Missing message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mini-app/connections/{id}/invoices:
    get:
      operationId: miniAppListInvoices
      tags: [mini-app]
      summary: List read-only sales invoices from the connected supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoices list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MiniAppInvoice"
        "403":
          description: No invoice permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        businessCode:
          type: string
          description: Business code for multi-tenant login (optional for super admin)
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/CurrentUser"
        business:
          $ref: "#/components/schemas/Business"
      required: [token, user]

    CurrentUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [super_admin, business_admin, staff]
        businessId:
          type: integer
        businessName:
          type: string
        permissions:
          type: array
          items:
            type: string
      required: [id, email, name, role]

    Plan:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        billingCycle:
          type: string
          enum: [monthly, yearly]
        maxUsers:
          type: integer
        features:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, name, price, billingCycle, isActive]

    CreatePlanBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        billingCycle:
          type: string
          enum: [monthly, yearly]
        maxUsers:
          type: integer
        features:
          type: array
          items:
            type: string
      required: [name, price, billingCycle]

    Business:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        businessCode:
          type: string
        gstin:
          type: string
        pan:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        stateCode:
          type: string
        pincode:
          type: string
        phone:
          type: string
        email:
          type: string
        businessType:
          type: string
        logo:
          type: string
        planId:
          type: integer
        planName:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended]
        financialYearStart:
          type: string
        currency:
          type: string
        createdAt:
          type: string
        userCount:
          type: integer
      required: [id, name, businessCode, status]

    BusinessListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Business"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total]

    RegisterBusinessBody:
      type: object
      properties:
        businessName:
          type: string
        gstin:
          type: string
        pan:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        stateCode:
          type: string
        pincode:
          type: string
        phone:
          type: string
        businessType:
          type: string
        adminName:
          type: string
        adminEmail:
          type: string
        adminPassword:
          type: string
        planId:
          type: integer
      required: [businessName, adminName, adminEmail, adminPassword]

    UpdateBusinessBody:
      type: object
      properties:
        name:
          type: string
        gstin:
          type: string
        pan:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        stateCode:
          type: string
        pincode:
          type: string
        phone:
          type: string
        email:
          type: string
        logo:
          type: string
        financialYearStart:
          type: string

    UpdateBusinessStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [active, inactive, suspended]
        planId:
          type: integer
      required: [status]

    SuperAdminStats:
      type: object
      properties:
        totalBusinesses:
          type: integer
        activeBusinesses:
          type: integer
        totalUsers:
          type: integer
        totalSalesThisMonth:
          type: number
        newBusinessesThisMonth:
          type: integer
        planBreakdown:
          type: array
          items:
            type: object
            properties:
              planName:
                type: string
              count:
                type: integer
            required: [planName, count]
      required: [totalBusinesses, activeBusinesses, totalUsers]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [business_admin, staff]
        permissions:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, name, email, role, isActive]

    CreateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [business_admin, staff]
        permissions:
          type: array
          items:
            type: string
      required: [name, email, password, role]

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        permissions:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        password:
          type: string

    Party:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [customer, supplier, both]
        gstin:
          type: string
        pan:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        stateCode:
          type: string
        pincode:
          type: string
        openingBalance:
          type: number
        openingBalanceType:
          type: string
          enum: [debit, credit]
        creditLimit:
          type: number
        creditDays:
          type: integer
        isActive:
          type: boolean
        currentBalance:
          type: number
        customFields:
          type: object
        createdAt:
          type: string
      required: [id, name, type, isActive]

    PartyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Party"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total]

    CreatePartyBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [customer, supplier, both]
        gstin:
          type: string
        pan:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        stateCode:
          type: string
        pincode:
          type: string
        openingBalance:
          type: number
        openingBalanceType:
          type: string
          enum: [debit, credit]
        creditLimit:
          type: number
        creditDays:
          type: integer
        customFields:
          type: object
      required: [name, type]

    PartyLedgerEntry:
      type: object
      properties:
        date:
          type: string
        voucherType:
          type: string
        voucherNumber:
          type: string
        description:
          type: string
        debit:
          type: number
        credit:
          type: number
        balance:
          type: number
      required: [date, voucherType, voucherNumber, debit, credit, balance]

    PartyLedgerResponse:
      type: object
      properties:
        party:
          $ref: "#/components/schemas/Party"
        openingBalance:
          type: number
        closingBalance:
          type: number
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PartyLedgerEntry"
      required: [openingBalance, closingBalance, entries]

    Item:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [goods, service]
        hsnCode:
          type: string
        unitId:
          type: integer
        unitName:
          type: string
        taxRateId:
          type: integer
        taxRate:
          type: number
        salePrice:
          type: number
        purchasePrice:
          type: number
        openingStock:
          type: number
        currentStock:
          type: number
        lowStockAlert:
          type: number
        isActive:
          type: boolean
        customFields:
          type: object
        createdAt:
          type: string
      required: [id, name, type, isActive]

    ItemListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total]

    CreateItemBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [goods, service]
        hsnCode:
          type: string
        unitId:
          type: integer
        taxRateId:
          type: integer
        salePrice:
          type: number
        purchasePrice:
          type: number
