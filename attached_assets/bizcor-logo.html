<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BizCor ERP – Animated Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0f1e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  .card {
    position: relative;
    width: 340px;
    height: 420px;
    border-radius: 32px;
    background: linear-gradient(160deg, #0d1b40 0%, #0f1e4a 60%, #111a3e 100%);
    border: 1px solid rgba(96,165,250,0.18);
    box-shadow: 0 8px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.92);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .card.show { opacity: 1; transform: scale(1); }

  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0;
    transition: opacity 1s ease;
    pointer-events: none;
  }
  .grid-bg.show { opacity: 0.8; }

  .glow {
    position: absolute;
    width: 280px; height: 280px;
    top: 50%; left: 50%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
    transform: translate(-50%,-50%) scale(0.2);
    transition: transform 1.2s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .glow.show { transform: translate(-50%,-50%) scale(1); }

  /* leaves */
  .leaf {
    position: absolute;
    pointer-events: none;
    filter: blur(0.2px);
    opacity: 0;
  }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 24px;
  }

  /* Icon wrapper */
  .icon-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(-24px);
    transition: opacity 0.8s ease 0.1s, transform 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.1s;
  }
  .icon-wrap.show { opacity: 1; transform: translateY(0); }

  .icon-box-outer {
    position: relative;
    width: 88px; height: 88px;
  }
  .icon-ring {
    position: absolute;
    inset: 0;
    border-radius: 22px;
    border: 1.5px solid rgba(96,165,250,0.4);
    transform: rotate(45deg) scale(0.5);
    transition: transform 1s cubic-bezier(0.34,1.56,0.64,1) 0.3s;
  }
  .icon-ring.show { transform: rotate(0deg) scale(1); }

  .icon-inner {
    position: absolute;
    inset: 8px;
    border-radius: 16px;
    background: linear-gradient(145deg, #1d4ed8 0%, #4f46e5 60%, #7c3aed 100%);
    box-shadow: 0 0 28px rgba(79,70,229,0.55), 0 0 56px rgba(59,130,246,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    transform: scale(0);
    transition: transform 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.5s;
  }
  .icon-inner.show { transform: scale(1); }

  .icon-inner svg path {
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .icon-inner svg path.p1 { transition-delay: 0.8s; }
  .icon-inner svg path.p2 { transition-delay: 1s; }
  .icon-inner svg path.show { opacity: 1; }

  .corner-dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    background: linear-gradient(135deg, #60a5fa, #818cf8);
    box-shadow: 0 0 8px rgba(96,165,250,0.9);
    opacity: 0;
    transform: scale(0);
  }
  .corner-dot.show { opacity: 1; transform: scale(1); }
  .corner-dot:nth-child(1) { top:-4px; left:-4px; transition: opacity 0.4s ease 1.2s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.2s; }
  .corner-dot:nth-child(2) { top:-4px; right:-4px; transition: opacity 0.4s ease 1.3s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.3s; }
  .corner-dot:nth-child(3) { bottom:-4px; left:-4px; transition: opacity 0.4s ease 1.4s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.4s; }
  .corner-dot:nth-child(4) { bottom:-4px; right:-4px; transition: opacity 0.4s ease 1.5s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.5s; }

  .text-block {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.7s ease 0.4s, transform 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.4s;
  }
  .text-block.show { opacity: 1; transform: translateY(0); }

  .brand-name {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 1px;
  }
  .brand-char {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -1px;
    display: inline-block;
    opacity: 0;
    transform: translateY(12px);
  }
  .brand-char.biz { color: #f0f4ff; }
  .brand-char.cor { color: #60a5fa; text-shadow: 0 0 20px rgba(96,165,250,0.65); }
  .brand-char.show { opacity: 1; transform: translateY(0); }

  .tagline {
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.5s ease 1.4s, transform 0.5s ease 1.4s;
  }
  .tagline.show { opacity: 1; transform: translateY(0); }
  .tagline-line { height: 1px; width: 32px; }
  .tagline span {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3.5px;
    color: rgba(148,163,184,0.8);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badges {
    margin-top: 18px;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    opacity: 0;
    transition: opacity 0.5s ease 1.8s;
  }
  .badges.show { opacity: 1; }
  .badge {
    padding: 4px 10px;
    border-radius: 16px;
    border: 1px solid rgba(96,165,250,0.2);
    background: rgba(59,130,246,0.1);
    font-size: 10px;
    font-weight: 600;
    color: rgba(148,163,184,0.8);
    opacity: 0;
    transform: translateY(6px);
  }
  .badge.show { opacity: 1; transform: translateY(0); }

  .powered {
    position: absolute;
    bottom: 16px;
    left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    z-index: 3;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s ease 2.2s, transform 0.6s ease 2.2s;
  }
  .powered.show { opacity: 1; transform: translateY(0); }
  .powered-line { height: 1px; width: 24px; }
  .powered-by { font-size: 10px; color: rgba(100,116,139,0.6); letter-spacing: 0.8px; }
  .powered-name {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #60a5fa, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  @keyframes pulse-ring {
    0% { transform: translate(-50%,-50%) scale(0.85); opacity: 0.45; }
    100% { transform: translate(-50%,-50%) scale(1.45); opacity: 0; }
  }
  .pulse-ring {
    position: absolute;
    width: 110px; height: 110px;
    border-radius: 28px;
    border: 1px solid rgba(96,165,250,0.3);
    top: 38%; left: 50%;
    z-index: 1;
    pointer-events: none;
    display: none;
  }
  .pulse-ring.show {
    display: block;
    animation: pulse-ring 3s ease-out infinite;
  }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="grid-bg" id="grid"></div>
  <div class="glow" id="glow"></div>
  <div class="pulse-ring" id="pulse"></div>

  <!-- Leaves rendered by JS -->

  <div class="content">
    <div class="icon-wrap" id="iconWrap">
      <div class="icon-box-outer">
        <div class="icon-ring" id="iconRing"></div>
        <div class="icon-inner" id="iconInner">
          <svg width="38" height="38" viewBox="0 0 40 40" fill="none">
            <path class="p1" d="M10 8h12c3.3 0 6 2.7 6 6s-2.7 6-6 6H10V8z" fill="white"/>
            <path class="p2" d="M10 20h13c3.9 0 7 3.1 7 7s-3.1 7-7 7H10V20z" fill="white"/>
          </svg>
        </div>
        <div class="corner-dot" id="cd1"></div>
        <div class="corner-dot" id="cd2"></div>
        <div class="corner-dot" id="cd3"></div>
        <div class="corner-dot" id="cd4"></div>
      </div>
    </div>

    <div class="text-block" id="textBlock">
      <div class="brand-name" id="brandName"></div>
      <div class="tagline" id="tagline">
        <div class="tagline-line" style="background:linear-gradient(90deg,transparent,rgba(96,165,250,0.5))"></div>
        <span>Enterprise Resource Planning</span>
        <div class="tagline-line" style="background:linear-gradient(90deg,rgba(96,165,250,0.5),transparent)"></div>
      </div>
      <div class="badges" id="badges"></div>
    </div>
  </div>

  <div class="powered" id="powered">
    <div class="powered-line" style="background:linear-gradient(90deg,transparent,rgba(96,165,250,0.3))"></div>
    <span class="powered-by">Powered By</span>
    <span class="powered-name">NAEWT</span>
    <div class="powered-line" style="background:linear-gradient(90deg,rgba(96,165,250,0.3),transparent)"></div>
  </div>
</div>

<script>
const CARD_W = 340, CARD_H = 420;
const LEAF_COLORS = [
  "rgba(96,165,250,0.6)","rgba(129,140,248,0.55)","rgba(167,139,250,0.5)",
  "rgba(74,222,128,0.55)","rgba(34,197,94,0.45)","rgba(134,239,172,0.5)",
  "rgba(248,113,113,0.5)","rgba(239,68,68,0.45)","rgba(252,165,165,0.5)",
  "rgba(59,130,246,0.45)"
];

function makeSVG(shape, size, color) {
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns,"svg");
  if (shape === 0) {
    svg.setAttribute("width", size); svg.setAttribute("height", size*1.4);
    svg.setAttribute("viewBox","0 0 20 28");
    const p = document.createElementNS(ns,"path");
    p.setAttribute("d","M10 2 C16 2, 20 8, 18 16 C16 22, 12 26, 10 26 C8 26, 4 22, 2 16 C0 8, 4 2, 10 2Z");
    p.setAttribute("fill",color); p.setAttribute("stroke","rgba(255,255,255,0.2)"); p.setAttribute("stroke-width","0.5");
    const l1=document.createElementNS(ns,"line"); l1.setAttribute("x1","10");l1.setAttribute("y1","4");l1.setAttribute("x2","10");l1.setAttribute("y2","24");l1.setAttribute("stroke","rgba(255,255,255,0.3)");l1.setAttribute("stroke-width","0.7");
    svg.append(p,l1);
  } else if (shape === 1) {
    svg.setAttribute("width", size*1.3); svg.setAttribute("height", size);
    svg.setAttribute("viewBox","0 0 30 20");
    const p = document.createElementNS(ns,"path");
    p.setAttribute("d","M2 10 C2 4, 10 1, 18 3 C24 5, 28 8, 28 10 C28 12, 24 16, 16 18 C8 20, 2 16, 2 10Z");
    p.setAttribute("fill",color); p.setAttribute("stroke","rgba(255,255,255,0.2)"); p.setAttribute("stroke-width","0.5");
    svg.append(p);
  } else {
    svg.setAttribute("width", size); svg.setAttribute("height", size*1.6);
    svg.setAttribute("viewBox","0 0 18 30");
    const p = document.createElementNS(ns,"path");
    p.setAttribute("d","M9 1 C14 4, 17 10, 15 18 C13 24, 10 28, 9 28 C8 28, 5 24, 3 18 C1 10, 4 4, 9 1Z");
    p.setAttribute("fill",color); p.setAttribute("stroke","rgba(255,255,255,0.15)"); p.setAttribute("stroke-width","0.5");
    svg.append(p);
  }
  return svg;
}

const leaves = Array.from({length:20},(_,i)=>({
  el: null, x: Math.random()*90+5, size: 10+Math.random()*14,
  duration: 4+Math.random()*5, delay: Math.random()*8,
  rotation: Math.random()*360, rotSpeed: (Math.random()-0.5)*2.5,
  swayAmp: 15+Math.random()*35, swaySpeed: 1.5+Math.random()*2,
  color: LEAF_COLORS[Math.floor(Math.random()*LEAF_COLORS.length)],
  shape: Math.floor(Math.random()*3)
}));

const card = document.getElementById("card");
leaves.forEach(leaf=>{
  const div = document.createElement("div");
  div.className = "leaf";
  div.appendChild(makeSVG(leaf.shape, leaf.size, leaf.color));
  card.appendChild(div);
  leaf.el = div;
});

const startTime = performance.now();
let phase = 0;

function schedulePhase(p, ms) {
  setTimeout(()=>{ phase=p; applyPhase(p); }, ms);
}
schedulePhase(1,300); schedulePhase(2,900); schedulePhase(3,1500); schedulePhase(4,2100);

function applyPhase(p) {
  if (p>=1) {
    card.classList.add("show");
    // Brand letters
    const bn = document.getElementById("brandName");
    if (!bn.children.length) {
      "BizCor".split("").forEach((ch,i)=>{
        const s=document.createElement("span");
        s.className="brand-char "+(i<3?"biz":"cor");
        s.textContent=ch;
        s.style.transition=`opacity 0.4s ease ${i*0.07+0.7}s, transform 0.5s cubic-bezier(0.34,1.56,0.64,1) ${i*0.07+0.7}s`;
        bn.appendChild(s);
      });
    }
    document.getElementById("iconWrap").classList.add("show");
  }
  if (p>=2) {
    document.getElementById("grid").classList.add("show");
    document.getElementById("glow").classList.add("show");
    document.getElementById("iconRing").classList.add("show");
    document.getElementById("iconInner").classList.add("show");
    document.getElementById("textBlock").classList.add("show");
    document.getElementById("pulse").classList.add("show");

    const badges = document.getElementById("badges");
    if (!badges.children.length) {
      ["Finance","HR","Supply Chain","Analytics"].forEach((b,i)=>{
        const d=document.createElement("div"); d.className="badge";
        d.textContent=b;
        d.style.transition=`opacity 0.3s ease ${i*0.08+1.9}s, transform 0.3s ease ${i*0.08+1.9}s`;
        badges.appendChild(d);
      });
    }
  }
  if (p>=3) {
    document.querySelectorAll(".brand-char").forEach(el=>el.classList.add("show"));
    document.querySelectorAll(".p1,.p2").forEach(el=>el.classList.add("show"));
  }
  if (p>=4) {
    document.getElementById("tagline").classList.add("show");
    document.getElementById("powered").classList.add("show");
    document.querySelectorAll(".corner-dot").forEach(el=>el.classList.add("show"));
    document.querySelectorAll(".badge").forEach(el=>el.classList.add("show"));
  }
}

function loop(ts) {
  const now = (ts - startTime) / 1000;
  leaves.forEach(leaf=>{
    const elapsed = (now - leaf.delay + 100) % leaf.duration;
    const progress = elapsed / leaf.duration;
    const yPx = progress * (CARD_H + leaf.size*2) - leaf.size;
    const sway = Math.sin((elapsed/leaf.swaySpeed)*Math.PI*2)*leaf.swayAmp;
    const xPct = leaf.x + sway*0.08;
    const rot = leaf.rotation + elapsed*leaf.rotSpeed*60;
    const opacity = phase>=2
      ? (progress<0.08 ? progress/0.08 : progress>0.88 ? (1-progress)/0.12 : 1)*0.9
      : 0;
    leaf.el.style.left = xPct+"%";
    leaf.el.style.top = yPx+"px";
    leaf.el.style.transform = `rotate(${rot}deg)`;
    leaf.el.style.opacity = opacity;
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
