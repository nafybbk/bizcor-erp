<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1e40af; color:#fff;
    font-family:'Segoe UI',Arial,sans-serif;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    height:100vh; user-select:none; }
  h1 { font-size:32px; font-weight:800; letter-spacing:-1px; }
  .sub { font-size:12px; opacity:.6; margin-top:5px; }
  .msg { margin-top:28px; font-size:13px; opacity:.85; }
  .spin { width:22px; height:22px;
    border:3px solid rgba(255,255,255,.3);
    border-top-color:#fff; border-radius:50%;
    animation:s .8s linear infinite; margin-top:14px; }
  @keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>
  <h1>BizCor ERP</h1>
  <div class="sub">LAN Server for Indian Businesses</div>
  <div class="msg" id="msg">Shuru ho raha hai...</div>
  <div class="spin"></div>
  <script>
    // Allow main process to update message
    if (window.location.hash) {
      document.getElementById('msg').textContent = decodeURIComponent(window.location.hash.slice(1));
    }
  </script>
</body>
</html>
