kind = "mobile"
previewPath = "/customer-network/"
title = "BizCor Customer Network"
version = "1.0.0"
id = "artifacts/customer-network"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/customer-network/" ]
localPort = 21092

[services.development]
run = "pnpm --filter @workspace/customer-network run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/customer-network", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/customer-network", "run", "serve" ]

[services.env]
PORT = "21092"
BASE_PATH = "/customer-network/"
