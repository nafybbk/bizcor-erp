name: Build Desktop EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases?'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  build-windows:
    # Pinned (not windows-latest): GitHub moved windows-latest to a
    # Windows Server 2025 + VS2026 image in July 2026, and node-gyp (bundled
    # with Node 22) can't find a Visual Studio install on it yet — better-
    # sqlite3's native build fails with "find-visualstudio.js" errors (broke
    # v2.4.105/106). windows-2022 keeps the older, node-gyp-compatible VS2022
    # image; nothing else in this workflow depends on 2025-specific behavior.
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API server bundle
        run: pnpm --filter @workspace/api-server run build

      - name: Copy server bundle to desktop
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts/desktop/server-bundle"
          Copy-Item -Path "artifacts/api-server/dist/*" -Destination "artifacts/desktop/server-bundle/" -Recurse -Force

      - name: Install offline SQLite deps in server-bundle (Node.js 22 — matches bundled node.exe)
        shell: pwsh
        run: |
          Push-Location "artifacts/desktop/server-bundle"
          if (-not (Test-Path "package.json")) {
            '{"name":"server-bundle","private":true}' | Out-File -FilePath "package.json" -Encoding utf8
          }
          # better-sqlite3: native SQLite — compiled here with Node.js 22, matches bundled node.exe ABI
          # drizzle-orm: needed because drizzle-orm/better-sqlite3 is used at runtime
          # PINNED to 12.11.1 (not latest): v13.0.0/13.0.1 (published 2026-07-21) segfaults
          # (STATUS_ACCESS_VIOLATION) on `new Database()` on Windows — verified locally with
          # the exact bundled node.exe. Every fresh install crashed on first launch until this
          # was pinned. Re-test before bumping past this version.
          npm install better-sqlite3@12.11.1 drizzle-orm --save --legacy-peer-deps
          Write-Host "SQLite deps installed:"
          node -e "const p=require('./package.json');console.log(JSON.stringify(p.dependencies,null,2))"
          # Verify the native addon exists
          $addonPath = "node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          if (Test-Path $addonPath) {
            $sizeMB = [math]::Round((Get-Item $addonPath).Length / 1KB, 0)
            Write-Host "better_sqlite3.node: $sizeMB KB - OK"
          } else {
            Write-Host "WARNING: better_sqlite3.node not found at $addonPath"
            Get-ChildItem "node_modules/better-sqlite3" -Recurse -Filter "*.node" | Select-Object FullName, Length
          }
          Pop-Location

      - name: Download bundled Node.js 22 runtime (matches installed ABI)
        shell: pwsh
        run: |
          $nodeVersion = "22.13.1"
          $url = "https://nodejs.org/dist/v$nodeVersion/win-x64/node.exe"
          Write-Host "Downloading Node.js v$nodeVersion..."
          Invoke-WebRequest -Uri $url -OutFile "artifacts/desktop/server-bundle/node.exe" -TimeoutSec 120
          $sizeMB = [math]::Round((Get-Item "artifacts/desktop/server-bundle/node.exe").Length / 1MB, 1)
          Write-Host "node.exe: $sizeMB MB"

      - name: Build ERP frontend
        run: pnpm --filter @workspace/erp run build

      - name: Copy frontend dist to desktop
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts/desktop/frontend-dist"
          Copy-Item -Path "artifacts/erp/dist/public/*" -Destination "artifacts/desktop/frontend-dist/" -Recurse -Force

      - name: Install desktop npm dependencies
        working-directory: artifacts/desktop
        run: npm install

      - name: Create assets directory and placeholder icon
        working-directory: artifacts/desktop
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "assets"
          if (-not (Test-Path "assets/icon.ico")) {
            try {
              Invoke-WebRequest -Uri "https://raw.githubusercontent.com/electron/electron/main/default_app/icon.ico" -OutFile "assets/icon.ico" -TimeoutSec 10 -ErrorAction SilentlyContinue
            } catch {
              Write-Host "Could not download icon"
            }
          }
          if (-not (Test-Path "assets/tray.png")) {
            try {
              Invoke-WebRequest -Uri "https://raw.githubusercontent.com/electron/electron/main/default_app/icon.png" -OutFile "assets/tray.png" -TimeoutSec 10 -ErrorAction SilentlyContinue
            } catch {
              Write-Host "Could not download tray icon"
            }
          }

      - name: Build Windows EXE
        working-directory: artifacts/desktop
        env:
          # PAT with contents:write on nafybbk/bizcor-releases — default GITHUB_TOKEN cannot publish to another repo
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        shell: pwsh
        run: |
          $publish = "never"
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -like "refs/tags/*") {
            $publish = "always"
          } elseif ("${{ inputs.publish }}" -eq "true") {
            $publish = "always"
          }
          npx electron-builder --win --publish $publish

      - name: Upload EXE as artifact (1 day — download backup)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: BizCor-ERP-Windows-${{ github.ref_name }}
          path: |
            artifacts/desktop/release/*.exe
            artifacts/desktop/release/latest.yml
          if-no-files-found: warn
          retention-days: 1
